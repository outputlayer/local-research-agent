name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    # macos-14 — Apple Silicon runner, required for mlx-lm (no Linux/Intel wheels)
    runs-on: macos-14
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # mlx-lm is sometimes missing fresh wheels — do not fail CI if it can't be installed
          pip install -r requirements.txt || pip install qwen-agent==0.0.34 json5==0.14.0 pytest==9.0.3
          # qwen-agent transitively imports soundfile and dateutil at module load time
          pip install soundfile python-dateutil
          pip install ruff

      - name: Ruff lint
        run: ruff check lra tests agent.py

      - name: Pytest
        run: python -m pytest -q
