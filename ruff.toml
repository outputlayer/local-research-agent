line-length = 110
target-version = "py312"

[lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = [
    "E501",   # длинные строки — промпты и сообщения ошибок, осознанно
    "E731",   # лямбды в тестах — это паттерн
    "B008",   # не используем Depends-стиль
]

[lint.per-file-ignores]
"tests/*" = ["E402", "F401"]
